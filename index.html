<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta大屠殺公墓 - 至尊行動控制台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #a30000;
            --accent-hover: #e60000;
            --stone-text: #222222; 
            --admin-bg: #111111;
            --card-bg: #1c1c1c;
            --border-color: #333333;
        }
        
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            font-size: 1rem;
            -webkit-tap-highlight-color: transparent;
        }

        #system-menu {
            background: #0d0d0d;
            padding: 12px 15px;
            border-bottom: 3px solid var(--accent-color);
            display: flex;
            justify-content: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .menu-btn {
            background: #252525; color: #bbb; border: 1px solid #444; padding: 12px;
            font-size: 1.05rem; border-radius: 8px; cursor: pointer; font-weight: bold;
            font-family: 'Noto Serif TC', serif; flex: 1; max-width: 250px;
            transition: all 0.2s ease;
        }
        .menu-btn.active { 
            background: var(--accent-color); color: #fff; 
            border-color: var(--accent-hover); 
            box-shadow: 0 0 10px rgba(163,0,0,0.5);
        }

        .page-view { display: none; padding: 15px; box-sizing: border-box; animation: fadeIn 0.3s ease; }
        .page-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header.hero { padding: 40px 15px 15px 15px; text-align: center; }
        header.hero h1 { font-family: 'Noto Serif TC', serif; font-size: 2.2rem; margin: 0; color: #fff; letter-spacing: 1px; }
        .owner-tag { margin-top: 10px; font-size: 0.9rem; color: #888; text-align: center; }
        .owner-tag a { color: #fff; text-decoration: none; border-bottom: 1px solid #666; }
        .subtitle { color: #555; font-style: italic; margin: 15px auto; font-size: 0.95rem; text-align: center; max-width: 500px; }
        .victim-counter { 
            background: rgba(163, 0, 0, 0.15); padding: 10px 25px; border-radius: 50px; 
            border: 1px solid var(--accent-color); font-size: 1rem; color: #ffcccc; 
            margin: 15px auto; display: table; font-weight: bold;
        }
        .search-bar { 
            padding: 14px 20px; border-radius: 30px; border: 2px solid #333; 
            background: #111; color: #fff; width: 100%; box-sizing: border-box; 
            font-size: 1.05rem; margin-bottom: 25px; text-align: center;
        }
        .search-bar:focus { border-color: var(--accent-color); outline: none; }

        .graveyard-container { width: 100%; padding: 0; box-sizing: border-box; }
        .graveyard { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; width: 100%; 
        }
        .tombstone-wrapper { position: relative; width: 100%; }
        .tombstone-wrapper img { width: 100%; filter: drop-shadow(0 5px 12px rgba(0,0,0,0.8)); }
        .tombstone-text { 
            position: absolute; top: 35%; left: 8%; right: 8%; text-align: center; 
            color: var(--stone-text); font-family: 'Noto Serif TC', serif; font-weight: 900; 
        }
        .tombstone-text .name { font-size: 0.85rem; margin-bottom: 3px; color: #111; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tombstone-text .id { font-size: 0.6rem; margin-bottom: 3px; color: #2a2a2a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; }
        .tombstone-text .date { font-size: 0.5rem; border-top: 1px solid #555; padding-top: 2px; margin-top: 2px; color: #444; }

        #admin-view { background: var(--admin-bg); }
        .admin-container { max-width: 800px; margin: 0 auto; }
        
        .panel-header-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .panel-title { font-size: 1.8rem; color: #ffffff; font-family: 'Noto Serif TC', serif; margin: 10px 0 20px 0; text-align: center; }
        
        .admin-box { background: var(--card-bg); padding: 18px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; text-align: left; }
        .admin-box h3 { margin-top: 0; font-family: 'Noto Serif TC', serif; font-size: 1.2rem; color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .form-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.9rem; color: #aaa; font-weight: bold; }
        .form-group input, .form-group select { background: #0a0a0a; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 6px; font-size: 1rem; }
        
        .action-btn { background: var(--accent-color); color: #fff; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.05rem; width: 100%; box-sizing: border-box; transition: 0.2s; text-align: center; }
        .action-btn.secondary { background: #333; border: 1px solid #555; color: #ddd; }
        .action-btn.danger-zone { background: #7f1d1d; }

        .batch-toolbar { background: #222; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .batch-buttons { display: flex; gap: 8px; width: 100%; }
        .batch-buttons button { flex: 1; padding: 10px; font-size: 0.9rem; background: #333; color: #ccc; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .data-list-container { display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .grave-item-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .grave-item-card .card-top { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }
        .grave-item-card .card-index { font-weight: bold; color: #ff8888; font-size: 1.1rem; }
        
        .card-inputs { display: flex; flex-direction: column; gap: 10px; }
        .card-input-group { display: flex; align-items: center; gap: 8px; }
        .card-input-group span { font-size: 0.85rem; color: #888; width: 50px; shrink: 0; font-weight: bold; }
        .card-input-group input { background: #0a0a0a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; flex-grow: 1; font-size: 1rem; }

        #autosave-indicator {
            position: fixed; bottom: 20px; right: 20px; background: #15803d; color: #fff;
            padding: 8px 16px; border-radius: 30px; font-size: 0.85rem; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none; z-index: 3000;
        }
    </style>
</head>
<body>

    <div id="system-menu">
        <button id="btn-gview" class="menu-btn active" onclick="switchPage('graveyard')">👁️ 巡視前台墓園</button>
        <button id="btn-aview" class="menu-btn" onclick="switchPage('admin')">🛠️ 進入決策後台</button>
    </div>

    <div id="autosave-indicator">✓ 已自動儲存並同步</div>

    <div id="graveyard-view" class="page-view active">
        <header class="hero">
            <h1>Meta大屠殺受害者公墓</h1>
            <p class="owner-tag">維護人：<a href="https://www.threads.net/@iam.xiaoyou" target="_blank">@iam.xiaoyou</a></p>
            <div class="subtitle">「我們致力於打造一個安全的社群... 直到你消失為止。」</div>
            <div class="victim-counter">已有 <span id="victim-count">0</span> 位在此長眠</div>
            <input type="text" id="searchInput" class="search-bar" placeholder="輸入關鍵字，搜尋特定的靈魂..." onkeyup="searchGraves()">
        </header>
        <div id="loading" style="text-align:center; font-weight:bold; color:#666;">正在開啟冥府公墓大門...</div>
        <div class="graveyard-container">
            <div class="graveyard" id="graveyard"></div>
        </div>
    </div>

    <div id="admin-view" class="page-view">
        <div class="admin-container">
            <h2 class="panel-title">冥府死籍行動控制台</h2>
            
            <div class="panel-header-buttons">
                <button class="action-btn secondary" onclick="pullFromGoogleSheet()">🔄 從雲端 Google 試算表同步覆蓋</button>
                <button class="action-btn danger-zone" onclick="clearAllGraves()">💀 徹底清空此公墓</button>
            </div>

            <div class="admin-box">
                <h3>➕ 快速手動通報安葬</h3>
                <div class="form-row">
                    <div class="form-group"><label>罹難者名稱</label><input type="text" id="addName" placeholder="例如：張小明"></div>
                    <div class="form-group"><label>Threads ID</label><input type="text" id="addID" placeholder="例如：xiaoming_123"></div>
                    <div class="form-group"><label>死亡安葬日期</label><input type="text" id="addDate" placeholder="2026-07-14"></div>
                </div>
                <button class="action-btn" style="background: #1e3a8a; margin-top: 10px;" onclick="manuallyAddVicitm()">立即建立墓碑</button>
            </div>

            <div class="admin-box" style="border: 2px solid #7f1d1d; background: rgba(127,29,29,0.15);">
                <h3 style="color: #fca5a5;">⚡ 指定數量：批量快速除籍</h3>
                <div class="form-group">
                    <label>要從「最新加入」的名單中，一口氣剔除幾筆？</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="number" id="quickDeleteCount" value="10" min="1" style="flex-grow: 1;">
                        <button class="action-btn" style="width: auto; background: #dc2626; padding: 0 20px; white-space: nowrap;" onclick="quickDeleteLatest()">執行除籍</button>
                    </div>
                </div>
            </div>

            <div class="admin-box">
                <h3>🏭 批量墓碑自動生產線</h3>
                <div class="form-row">
                    <div class="form-group"><label>生成數量 (座)</label><input type="number" id="batchCount" value="10" min="1"></div>
                    <div class="form-group"><label>名稱字首範本</label><input type="text" id="batchNamePattern" value="無名受害者_"></div>
                    <div class="form-group"><label>Threads ID 字首範本</label><input type="text" id="batchIDPattern" value="meta_victim_"></div>
                    <div class="form-group"><label>統一死亡日期</label><input type="text" id="batchDate" value="2026-07-14"></div>
                </div>
                <button class="action-btn" style="background: #6b21a8; margin-top: 10px;" onclick="generateBatchVictims()">啟動流水線・批量鑄造</button>
            </div>

            <div class="batch-toolbar">
                <div class="batch-buttons">
                    <button onclick="toggleSelectAll(true)">✓ 全選</button>
                    <button onclick="toggleSelectAll(false)">❌ 取消</button>
                    <button onclick="reverseSelection()">🔄 反選</button>
                </div>
                <button class="action-btn" style="background: #991b1b; padding: 12px;" onclick="deleteSelectedVictims()">🗑️ 刪除已勾選項目 (<span id="selected-counter">0</span>)</button>
            </div>

            <div class="data-list-container" id="adminDataCards"></div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1fNqY7jkBBoXbw5w0EqzzdvtPHI2vMfXX1Sk4co11SJ4/gviz/tq?tqx=out:csv';
        const TOMBSTONE_IMG = 'file_0000000012cc722fadf5374a54f461bd.png';
        
        let deadPeople = [];
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('addDate').value = todayStr;
        document.getElementById('batchDate').value = todayStr;

        // 【自動儲存並強制同步前台】
        function autoSave() {
            localStorage.setItem('local_graveyard_db', JSON.stringify(deadPeople));
            
            // 即時同步給前台的 HTML 結構，防止凍結
            renderFrontEnd(); 

            const indicator = document.getElementById('autosave-indicator');
            indicator.style.display = 'block';
            setTimeout(() => { indicator.style.display = 'none'; }, 1000);
        }

        // 【關鍵修正：點選切換頁面時，強制重新渲染前台】
        function switchPage(page) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            if (page === 'graveyard') {
                document.getElementById('graveyard-view').classList.add('active');
                document.getElementById('btn-gview').classList.add('active');
                renderFrontEnd(); // 每次點擊巡視前台，都用最新記憶體重繪畫面
            } else {
                document.getElementById('admin-view').classList.add('active');
                document.getElementById('btn-aview').classList.add('active');
                renderAdminCards();
            }
        }

        async function pullFromGoogleSheet() {
            if(deadPeople.length > 0 && !confirm("這將會覆蓋你目前在手機上修改、生成的全部本機資料！確定同步嗎？")) return;
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                deadPeople = parseCSV(text);
                autoSave();
                alert(`同步完成！已載入 ${deadPeople.length} 筆靈魂資料。`);
                renderFrontEnd();
                renderAdminCards();
            } catch (e) { alert('網路異常，無法取得 Google 試算表。'); }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n'); const result = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const row = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                const cleanData = row.map(val => val.replace(/^"|"$/g, '').replace(/""/g, '"'));
                if(cleanData[1] || cleanData[2]) result.push({ name: cleanData[1] || '無名氏', id: cleanData[2] || '未知', date: cleanData[3] || todayStr });
            }
            return result.reverse();
        }

        function renderFrontEnd(dataList = deadPeople) {
            const container = document.getElementById('graveyard');
            document.getElementById('loading').style.display = 'none';
            container.innerHTML = '';
            document.getElementById('victim-count').innerText = deadPeople.length;
            
            dataList.forEach(person => {
                const grave = document.createElement('div'); grave.className = 'tombstone-wrapper';
                grave.innerHTML = `
                    <img src="${TOMBSTONE_IMG}" loading="lazy">
                    <div class="tombstone-text">
                        <div class="name">${escapeHTML(person.name)}</div>
                        <div class="id">${escapeHTML(person.id)}</div>
                        <div class="date">${escapeHTML(person.date)}</div>
                    </div>
                `;
                container.appendChild(grave);
            });
        }

        function searchGraves() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            renderFrontEnd(deadPeople.filter(p => p.name.toLowerCase().includes(keyword) || p.id.toLowerCase().includes(keyword)));
        }

        function renderAdminCards() {
            const container = document.getElementById('adminDataCards');
            container.innerHTML = '';
            deadPeople.forEach((person, index) => {
                const card = document.createElement('div');
                card.className = 'grave-item-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <div class="card-top">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" class="grave-checkbox" onchange="updateSelectedCounter()">
                            <span class="card-index">#${deadPeople.length - index}</span>
                        </div>
                        <button class="btn-delete" onclick="deleteVictim(${index})">⚰️ 除籍</button>
                    </div>
                    <div class="card-inputs">
                        <div class="card-input-group"><span>名稱:</span><input type="text" value="${escapeHTML(person.name)}" oninput="updateCell(${index}, 'name', this.value)"></div>
                        <div class="card-input-group"><span>ID:</span><input type="text" value="${escapeHTML(person.id)}" oninput="updateCell(${index}, 'id', this.value)"></div>
                        <div class="card-input-group"><span>日期:</span><input type="text" value="${escapeHTML(person.date)}" oninput="updateCell(${index}, 'date', this.value)"></div>
                    </div>
                `;
                container.appendChild(card);
            });
            updateSelectedCounter();
        }

        function updateCell(index, field, value) { 
            deadPeople[index][field] = value; 
            autoSave(); 
        }

        function manuallyAddVicitm() {
            const name = document.getElementById('addName').value.trim();
            const id = document.getElementById('addID').value.trim();
            const date = document.getElementById('addDate').value.trim();

            if (!name || !id) return alert('請完整輸入名稱與 ID！');

            deadPeople.unshift({ name, id, date: date || todayStr });
            document.getElementById('addName').value = '';
            document.getElementById('addID').value = '';
            
            autoSave(); 
            alert(`已成功安葬：${name}`);
            renderAdminCards();
        }

        function quickDeleteLatest() {
            const countInput = document.getElementById('quickDeleteCount');
            const deleteCount = parseInt(countInput.value);
            
            if (isNaN(deleteCount) || deleteCount < 1) return alert('請輸入有效的刪除數量！');
            if (deadPeople.length === 0) return alert('公墓內已無任何死籍可供剔除。');
            
            const actualDeleteCount = Math.min(deleteCount, deadPeople.length);
            if (!confirm(`⚠️ 確定要從最新的數據中，「一口氣剔除最後加入的 ${actualDeleteCount} 筆」資料嗎？`)) return;
            
            deadPeople.splice(0, actualDeleteCount);
            
            autoSave(); 
            alert(`🔥 已成功刪除 ${actualDeleteCount} 筆最新死籍！`);
            renderAdminCards();
        }

        function generateBatchVictims() {
            const count = parseInt(document.getElementById('batchCount').value);
            const namePrefix = document.getElementById('batchNamePattern').value;
            const idPrefix = document.getElementById('batchIDPattern').value;
            const date = document.getElementById('batchDate').value.trim();
            
            if (isNaN(count) || count < 1) return alert('請輸入正確的生成數量！');
            if (!confirm(`確認要透過流水線，一次性生成 ${count} 座墓碑嗎？`)) return;

            for (let i = 1; i <= count; i++) {
                let numStr = String(i).padStart(3, '0');
                deadPeople.unshift({ name: `${namePrefix}${numStr}`, id: `${idPrefix}${numStr}`, date: date || todayStr });
            }
            
            autoSave(); 
            alert(`🏭 自動工廠已成功產出 ${count} 具木棺！`);
            renderAdminCards();
        }

        // 勾選控制項目
        function updateSelectedCounter() { document.getElementById('selected-counter').innerText = document.querySelectorAll('.grave-checkbox:checked').length; }
        function toggleSelectAll(status) { document.querySelectorAll('.grave-checkbox').forEach(cb => cb.checked = status); updateSelectedCounter(); }
        function reverseSelection() { document.querySelectorAll('.grave-checkbox').forEach(cb => cb.checked = !cb.checked); updateSelectedCounter(); }
        
        function deleteVictim(index) {
            if(confirm(`確定要將此位移出公墓嗎？`)) { 
                deadPeople.splice(index, 1); 
                autoSave(); 
                renderAdminCards(); 
            }
        }

        function deleteSelectedVictims() {
            const checkboxes = document.querySelectorAll('.grave-checkbox'); let toDelete = [];
            checkboxes.forEach((cb, idx) => { if(cb.checked) toDelete.push(idx); });
            if (toDelete.length === 0) return alert('你尚未勾選任何死籍目標！');
            if (!confirm(`確定集體刪除這 ${toDelete.length} 筆資料嗎？`)) return;
            
            toDelete.sort((a, b) => b - a).forEach(idx => deadPeople.splice(idx, 1));
            autoSave(); 
            renderAdminCards();
        }

        function clearAllGraves() { 
            if (confirm('🚨🚨🚨 警告：這會將全墓園夷為平地！確定要全部清空嗎？')) { 
                deadPeople = []; 
                autoSave(); 
                renderAdminCards(); 
            } 
        }

        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }

        window.onload = () => {
            const cache = localStorage.getItem('local_graveyard_db');
            if (cache) { 
                deadPeople = JSON.parse(cache); 
                renderFrontEnd(); 
            } else { 
                pullFromGoogleSheet(); 
            }
        };
    </script>
</body>
</html>
